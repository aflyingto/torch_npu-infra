name: Fast Build torch_npu

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - 'skills/**'
      - 'LICENSE'
      - '.gitignore'
  pull_request:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'doc/**'
      - 'skills/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        default: '3.10'

env:
  PYTHON_VERSION: ${{ github.event.inputs.python_version || '3.10' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            build-essential \
            libopenblas-dev \
            liblapack-dev \
            libeigen3-dev \
            libprotobuf-dev \
            protobuf-compiler \
            curl \
            wget \
            ninja-build \
            ccache \
            patchelf \
            libomp-dev \
            libnuma-dev \
            file \
            binutils \
            libssl-dev \
            libffi-dev

      - name: Checkout torch_npu-infra
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python build dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install numpy pyyaml typing_extensions cmake ninja six

      - name: Install PyTorch Nightly
        run: |
          pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu

      - name: Verify PyTorch installation
        run: |
          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          python -c "import torch; print(f'PyTorch path: {torch.__file__}')"

      - name: Checkout torch_npu
        uses: actions/checkout@v4
        with:
          repository: Ascend/pytorch
          path: torch_npu
          submodules: false

      - name: Initialize torch_npu submodules
        run: |
          cd torch_npu
          git submodule update --init --recursive

      - name: Build CANN stub libraries
        run: |
          cd torch_npu/third_party/acl/libs
          bash build_stub.sh

      - name: Build torch_npu
        run: |
          cd torch_npu
          export CMAKE_PREFIX_PATH="${{ env.Python3_ROOT_DIR }}"
          export MAX_JOBS=$(nproc)
          export CMAKE_BUILD_TYPE=Release
          export _GLIBCXX_USE_CXX11_ABI=1
          export DISABLE_INSTALL_TORCHAIR=TRUE
          export DISABLE_RPC_FRAMEWORK=TRUE
          python setup.py build bdist_wheel

      - name: List built wheels
        run: |
          echo "Built wheels:"
          ls -la torch_npu/dist/ || echo "No wheels found"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: torch_npu-wheel-fast-build
          path: torch_npu/dist/*.whl
          retention-days: 7

      - name: Test torch_npu import
        run: |
          pip install torch_npu/dist/*.whl || echo "Wheel installation may have issues"
          python -c "import torch_npu; print(f'torch_npu version: {torch_npu.__version__}')" || echo "Import test may have issues due to missing NPU hardware"
