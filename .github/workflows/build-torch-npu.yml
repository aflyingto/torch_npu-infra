name: Build torch_npu with latest PyTorch

on:
  push:
    branches:
      - main
      - master
      - dev-cache
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:
    inputs:
      python_version:
        description: 'Python version to use'
        required: false
        default: '3.10'
      pytorch_branch:
        description: 'PyTorch branch to build from'
        required: false
        default: 'main'

env:
  PYTHON_VERSION: ${{ github.event.inputs.python_version || '3.10' }}
  PYTORCH_BRANCH: ${{ github.event.inputs.pytorch_branch || 'main' }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git \
            cmake \
            build-essential \
            libopenblas-dev \
            liblapack-dev \
            libeigen3-dev \
            libprotobuf-dev \
            protobuf-compiler \
            curl \
            wget \
            ninja-build \
            ccache \
            patchelf \
            libomp-dev \
            libnuma-dev \
            file \
            binutils \
            libssl-dev \
            libffi-dev

      - name: Checkout torch_npu-infra
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python build dependencies
        run: |
          pip install --upgrade pip setuptools wheel
          pip install numpy pyyaml typing_extensions cmake ninja six

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ccache

      - name: Configure ccache
        run: |
          ccache --set-config=cache_dir=~/.ccache
          ccache --set-config=max_size=5G
          ccache --set-config=compression=true
          ccache -p
          ccache -z  # Zero statistics counter
          # Only set CMAKE compiler launchers, not CC/CXX to avoid ccache being used for assembler
          echo "CMAKE_C_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=ccache" >> $GITHUB_ENV

      - name: Checkout PyTorch
        uses: actions/checkout@v4
        with:
          repository: pytorch/pytorch
          ref: ${{ env.PYTORCH_BRANCH }}
          path: pytorch
          submodules: recursive

      - name: Checkout torch_npu
        uses: actions/checkout@v4
        with:
          repository: Ascend/pytorch
          path: torch_npu
          submodules: false

      - name: Initialize torch_npu submodules
        run: |
          cd torch_npu
          # Update .gitmodules to use GitHub mirrors instead of gitee
          if [ -f .gitmodules ]; then
            sed -i 's|https://gitee.com/mirrors/|https://github.com/|g' .gitmodules
            sed -i 's|https://gitee.com/|https://github.com/|g' .gitmodules
            cat .gitmodules
          fi
          git submodule sync
          # Initialize op-plugin submodule specifically (required for build)
          git submodule update --init third_party/op-plugin
          # Try to init other submodules, but don't fail if some are unavailable
          git submodule update --init --recursive || echo "Some submodules may not be available"

      - name: Build PyTorch from source
        run: |
          cd pytorch
          export CMAKE_PREFIX_PATH="${{ env.Python3_ROOT_DIR }}"
          export USE_CUDA=0
          export USE_DISTRIBUTED=1
          export BUILD_TEST=0
          export MAX_JOBS=$(nproc)
          export CMAKE_BUILD_TYPE=Release
          export USE_CCACHE=1
          python setup.py build develop

      - name: Show ccache statistics after PyTorch build
        run: ccache -s

      - name: Verify PyTorch installation
        run: |
          python -c "import torch; print(f'PyTorch version: {torch.__version__}')"
          python -c "import torch; print(f'PyTorch path: {torch.__file__}')"

      - name: Build CANN stub libraries
        run: |
          cd torch_npu/third_party/acl/libs
          bash build_stub.sh

      - name: Build torch_npu
        run: |
          cd torch_npu
          export CMAKE_PREFIX_PATH="${{ env.Python3_ROOT_DIR }}"
          export MAX_JOBS=$(nproc)
          export CMAKE_BUILD_TYPE=Release
          export _GLIBCXX_USE_CXX11_ABI=1
          export DISABLE_INSTALL_TORCHAIR=TRUE
          export DISABLE_RPC_FRAMEWORK=TRUE
          python setup.py build bdist_wheel

      - name: Show ccache statistics after torch_npu build
        run: ccache -s

      - name: List built wheels
        run: |
          echo "Built wheels:"
          ls -la torch_npu/dist/ || echo "No wheels found"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: torch_npu-wheel
          path: torch_npu/dist/*.whl
          retention-days: 30

      - name: Test torch_npu import
        run: |
          pip install torch_npu/dist/*.whl || echo "Wheel installation may have issues"
          python -c "import torch_npu; print(f'torch_npu version: {torch_npu.__version__}')" || echo "Import test may have issues due to missing NPU hardware"
